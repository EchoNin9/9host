# Deploy to Production on push to main
name: Deploy Production

on:
  push:
    branches: [main]

permissions:
  id-token: write
  contents: read

concurrency: 9host-tofu-deploy

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN_PRODUCTION }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}

      - name: Set up OpenTofu
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_wrapper: false

      - name: OpenTofu init (remote state)
        working-directory: infra
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          tofu init -reconfigure -backend-config="bucket=9host-tofu-state-${ACCOUNT_ID}" -backend-config="key=9host/terraform.tfstate" -backend-config="region=${{ vars.AWS_REGION || 'us-east-1' }}" -backend-config="dynamodb_table=9host-tofu-state-lock"

      - name: OpenTofu plan
        working-directory: infra
        run: tofu plan -no-color -var="github_org_repo=${{ github.repository }}" -var='domains=["echo9.net"]'

      - name: OpenTofu apply
        working-directory: infra
        run: tofu apply -auto-approve -no-color -var="github_org_repo=${{ github.repository }}" -var='domains=["echo9.net"]'

      - name: Sync frontend to S3 (production)
        run: |
          aws s3 sync frontend/dist/ s3://9host-frontend-production/ --delete

      - name: Invalidate CloudFront cache (production)
        run: |
          DIST_ID=$(cd infra && tofu output -raw cloudfront_production_distribution_id)
          aws cloudfront create-invalidation --distribution-id "$DIST_ID" --paths "/*"
